# herdr configuration
# linked to ~/.config/herdr/config.toml (config.toml のみリンク。
# ~/.config/herdr/ 配下にはソケット・ログ等のランタイムファイルが生成されるため
# ディレクトリごとリンクしないこと)
#
# 全デフォルト値は `herdr --default-config` で確認できる。
# 変更後は `herdr server reload-config` で反映。

# 初回起動時の通知オンボーディングは表示しない
onboarding = false

[theme]
# zsh テーマ・WezTerm と揃えて nord
name = "nord"

[keys]
# tmux / WezTerm と同じ prefix (デフォルトも ctrl+b)
prefix = "ctrl+b"

[ui]
# Agent パネルは space (workspace) 単位でグルーピング
agent_panel_sort = "spaces"

# ペインボーダー右上の agent ラベル (Claude session 名等) は表示しない
# (Claude Code の statusline 側で session 名を表示するため二重になる)
show_agent_labels_on_pane_borders = false

[ui.toast]
# ポップアップ通知は出さない（音のみ受け取る）
# off / herdr / terminal / system
delivery = "off"

[ui.sound]
# agent 状態変化のサウンド通知（ローカルクライアント側で再生）
enabled = true

[session]
# herdr server 再起動後、Claude Code 等の agent ペインを元の会話セッションに復帰させる
resume_agents_on_restore = true
